<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelForge AI</title>
    <style>
        /* ===== GLOBAL STYLE ===== */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: #1e293b;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* ===== INPUT & BUTTON ===== */
        input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #334155;
            border: 1px dashed #475569;
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.2s;
        }

        .btn-generate {
            background-color: #22c55e;
            color: white;
        }

        .btn-download {
            background-color: #3b82f6;
            color: white;
            margin-top: 15px;
        }

        button:active {
            opacity: 0.8;
        }

        /* ===== PREVIEW AREA ===== */
        #previewBox {
            display: none; /* Sembunyi sampai tombol generate diklik */
            margin-top: 25px;
            text-align: left;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            background-color: #0f172a;
            border-radius: 12px;
            overflow: hidden;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #preview {
            width: 100%;    /* Gambar memenuhi lebar kotak */
            height: auto;   /* Proporsi tetap terjaga */
            display: block;
        }

        #loadingOverlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔥 PixelForge AI</h2>
    <p>Ubah foto jadi iklan produk otomatis</p>

    <input type="file" id="imageInput" accept="image/*">
    <button class="btn-generate" onclick="generate()">Generate</button>

    <div id="previewBox">
        <p style="color: #f8fafc; font-weight: bold;">Hasil Generate:</p>
        <div class="image-wrapper">
            <img id="preview" alt="Hasil akan muncul di sini">
            <div id="loadingOverlay">
                <span>⏳ Generating...</span>
            </div>
        </div>
        <button class="btn-download" onclick="downloadImage()">Download Gambar</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
